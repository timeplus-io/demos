spec:
  template:
    spec:
      containers:
      - name: timeplusd  # This must match the container name in your describe output
        volumeMounts:
        - name: kafka-auth-volume
          mountPath: "/etc/kafka-config"
          readOnly: true
      volumes:
      - name: kafka-auth-volume
        secret:
          secretName: timeplus-kafka-auth
